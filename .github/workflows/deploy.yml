name: CI/CD Pipeline - Stokklukeanalyse

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  # Job 1: Testy jednostkowe
  test:
    name: Run Automated Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest
        run: |
          python -m pytest

  # Job 2: Budowanie obrazu i wdrożenie na AWS
  deploy:
    name: Build & Deploy to AWS ECS
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: stokklukka
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Budowanie kontenera z tagami sha oraz latest
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          # Wypychanie obrazu do chmury AWS
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:latest" >> $GITHUB_OUTPUT

      # Pobieramy aktywną definicję zadania z AWS, aby zaktualizować w niej tag obrazu
      - name: Download Active Task Definition from ECS
        run: |
          aws ecs describe-task-definition \
            --task-definition stokklukka-task \
            --query taskDefinition > task-definition.json

      # Podmieniamy obraz w pobranej definicji zadania na nasz najnowszy
      - name: Render new Task Definition with latest ECR image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: stokklukka
          image: ${{ steps.login-ecr.outputs.registry }}/stokklukka:latest

      # Wdrażamy zaktualizowaną definicję na ECS Fargate
      - name: Deploy to Amazon ECS Service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: stokklukka-service
          cluster: stokklukka-cluster
          wait-for-service-stability: true
